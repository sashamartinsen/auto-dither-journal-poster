<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>DITHER//ASCII POSTER TOOL</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <aside class="panel controls">
      <header class="brand">
        <div class="brand__title">DITHER//ASCII</div>
        <div class="brand__subtitle">photo → dither → ASCII overlay</div>
      </header>

      <label class="dropzone" for="imageInput" id="dropzone">
        <input id="imageInput" type="file" accept="image/*" />
        <span>PRIMARY IMAGE</span>
        <small>Drop / select the base image</small>
      </label>

      <details class="control-block collapsible" open>
        <summary>Image / Dither</summary>
        <div class="block-body">
          <div class="two">
            <label class="field">Width<input id="widthInput" type="number" value="1200" min="320" max="2600" step="10" /></label>
            <label class="field">Height<input id="heightInput" type="number" value="1500" min="320" max="2600" step="10" /></label>
          </div>

          <details class="sub-block collapsible" open>
            <summary>Base layer</summary>
            <div class="block-body">
              <div class="two">
                <label class="field">Algorithm<select id="algorithmInput"><option value="fs" selected>Floyd–Steinberg</option><option value="bayer">Bayer 4×4</option></select></label>
                <label class="field">Dither scale <output id="scaleOut">3</output><input id="scaleInput" type="range" min="3" max="12" value="3" /></label>
              </div>
              <div class="two">
                <label class="field">Threshold <output id="thresholdOut">0</output><input id="thresholdInput" type="range" min="-90" max="90" value="0" /></label>
                <label class="field">Contrast <output id="contrastOut">0</output><input id="contrastInput" type="range" min="-100" max="100" value="0" /></label>
              </div>
              <div class="two">
                <label class="field">Vignette <output id="vignetteOut">28</output><input id="vignetteInput" type="range" min="0" max="100" value="28" /></label>
                <label class="field">Grain <output id="grainOut">24</output><input id="grainInput" type="range" min="0" max="90" value="24" /></label>
              </div>
              <div class="position-row compact-sliders">
                <label class="field">Image scale <output id="imageScaleOut">100</output><input id="imageScaleInput" type="range" min="50" max="250" value="100" /></label>
                <div class="field xy-field">
                  <span>Offset <output id="offsetXOut">0</output> / <output id="offsetYOut">0</output></span>
                  <div class="xy-row">
                    <label>X<input id="offsetXInput" type="range" min="-100" max="100" value="0" /></label>
                    <label>Y<input id="offsetYInput" type="range" min="-100" max="100" value="0" /></label>
                  </div>
                </div>
              </div>
              <div class="two">
                <label class="field">Dark<input id="darkInput" type="color" value="#080204" /></label>
                <label class="field">Hot<input id="hotInput" type="color" value="#004bff" /></label>
              </div>
            </div>
          </details>

          <details class="sub-block collapsible" open>
            <summary>Second image layer</summary>
            <div class="block-body">
              <label class="toggle-line"><input id="enableSecondLayerInput" type="checkbox" /> Enable second image layer</label>
              <label class="dropzone dropzone--small" for="imageInput2">
                <input id="imageInput2" type="file" accept="image/*" />
                <span>SECONDARY IMAGE</span>
                <small>Optional overlay image</small>
              </label>
              <div class="two">
                <label class="field">Algorithm<select id="algorithm2Input"><option value="fs" selected>Floyd–Steinberg</option><option value="bayer">Bayer 4×4</option></select></label>
                <label class="field">Dither scale <output id="scale2Out">3</output><input id="scale2Input" type="range" min="3" max="12" value="3" /></label>
              </div>
              <div class="two">
                <label class="field">Threshold <output id="threshold2Out">0</output><input id="threshold2Input" type="range" min="-90" max="90" value="0" /></label>
                <label class="field">Contrast <output id="contrast2Out">0</output><input id="contrast2Input" type="range" min="-100" max="100" value="0" /></label>
              </div>
              <div class="two">
                <label class="field">Vignette <output id="vignette2Out">0</output><input id="vignette2Input" type="range" min="0" max="100" value="0" /></label>
                <label class="field">Grain <output id="grain2Out">0</output><input id="grain2Input" type="range" min="0" max="90" value="0" /></label>
              </div>
              <div class="position-row compact-sliders">
                <label class="field">Image scale <output id="imageScale2Out">100</output><input id="imageScale2Input" type="range" min="50" max="250" value="100" /></label>
                <div class="field xy-field">
                  <span>Offset <output id="offsetX2Out">0</output> / <output id="offsetY2Out">0</output></span>
                  <div class="xy-row">
                    <label>X<input id="offsetX2Input" type="range" min="-100" max="100" value="0" /></label>
                    <label>Y<input id="offsetY2Input" type="range" min="-100" max="100" value="0" /></label>
                  </div>
                </div>
              </div>
              <div class="one">
                <label class="field">Second layer hot<input id="hot2Input" type="color" value="#ff3b47" /></label>
              </div>
            </div>
          </details>
        </div>
      </details>

      <details class="control-block collapsible" open>
        <summary>ASCII Graphics</summary>
        <div class="block-body">
          <div class="two">
            <label class="field">Blend mode<select id="blendModeInput"><option value="source-over" selected>Normal</option><option value="multiply">Multiply</option><option value="lighter">Add</option></select></label>
            <label class="field">Font<select id="fontInput"><option value="consolas" selected>Consolas</option><option value="cascadia">Cascadia Mono</option><option value="courier">Courier New</option><option value="monospace">System Monospace</option></select></label>
          </div>
          <div class="two">
            <label class="field">Size <output id="textSizeOut">100</output><input id="textSizeInput" type="range" min="60" max="180" value="100" /></label>
            <label class="field">Opacity <output id="overlayOut">100</output><input id="overlayInput" type="range" min="0" max="100" value="100" /></label>
          </div>

          <details class="sub-block collapsible" open>
            <summary>Words layer</summary>
            <div class="block-body">
              <label class="toggle-line"><input id="enableWordsLayerInput" type="checkbox" checked /> Enable words</label>
              <label class="field">Words / comma separated<input id="wordsInput" type="text" value="DELTA, NULL SIGNAL, BECOME THE EXIT" placeholder="DELTA, NULL SIGNAL, EXIT" /></label>
              <div class="one">
                <label class="field">Word color<input id="wordColorInput" type="color" value="#d8ffd8" /></label>
              </div>
            </div>
          </details>

          <details class="sub-block collapsible" open>
            <summary>Glyph particles layer</summary>
            <div class="block-body">
              <label class="toggle-line"><input id="enableGlyphLayerInput" type="checkbox" checked /> Enable glyph particles</label>
              <div class="three">
                <label class="field">Density <output id="densityOut">70</output><input id="densityInput" type="range" min="0" max="100" value="70" /></label>
                <label class="field">Cols <output id="glyphColsOut">7</output><input id="glyphColsInput" type="range" min="3" max="12" value="7" /></label>
                <label class="field">Rows <output id="glyphRowsOut">7</output><input id="glyphRowsInput" type="range" min="3" max="12" value="7" /></label>
              </div>
              <div class="one">
                <label class="field">Glyph color<input id="glyphColorInput" type="color" value="#29ff7a" /></label>
              </div>
            </div>
          </details>

          <details class="sub-block collapsible" open>
            <summary>Grid layer</summary>
            <div class="block-body">
              <label class="toggle-line"><input id="enableSymbolGridInput" type="checkbox" /> Enable symbol grid</label>
              <div class="three">
                <label class="field">Cols <output id="gridColsOut">7</output><input id="gridColsInput" type="range" min="2" max="20" value="7" /></label>
                <label class="field">Rows <output id="gridRowsOut">7</output><input id="gridRowsInput" type="range" min="2" max="20" value="7" /></label>
                <label class="field">Symbol<select id="gridSymbolInput"><option value="+" selected>+</option><option value=".">.</option><option value=":">:</option><option value="::">::</option><option value="x">x</option><option value="random">Random</option></select></label>
              </div>
            </div>
          </details>
        </div>
      </details>

      <div class="buttons">
        <button id="randomBtn" type="button">REROLL ASCII</button>
        <button id="randomColorsBtn" type="button">RANDOM ALL COLORS</button>
        <button id="renderBtn" type="button">RENDER</button>
        <button id="downloadBtn" type="button">EXPORT PNG</button>
      </div>
    </aside>

    <section class="panel stage">
      <canvas id="canvas" width="1200" height="1500"></canvas>
      <p class="caption">GitHub Pages compatible: static HTML/CSS/JS, no build step.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
